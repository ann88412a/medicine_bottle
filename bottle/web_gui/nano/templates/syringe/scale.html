<!doctype html>


<head>
    <title>Scale</title>
    <meta charset=utf-8>
</head>

<body>
    {% if syringe_type == "" %}
        <h1>Syringe type:</h1>
        <form method="post">
            <input type="submit" name="syringe_type" value="1 ml" />
            <input type="submit" name="syringe_type" value="3 ml" />
            <input type="submit" name="syringe_type" value="5 ml" />
            <input type="submit" name="syringe_type" value="10 ml" />
            <input type="submit" name="syringe_type" value="100 units" />
            <input type="submit" name="syringe_type" value="others" />
        </form>
    {% else %}
        <h1>Syringe scale:</h1>
<!--        <h3>Syringe type: {{syringe_type}}</h3>-->
        <img style="width: 360px;height: 640px;" src="{{ url_for('video_stream') }}"><br>
        <button> <a href="/syringe">OK</a></button>
        <button> <a href="/syringe">exit</a></button>
    {% endif %}
</body>
