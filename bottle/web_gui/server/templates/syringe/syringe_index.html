<!doctype html>
<head>
    <title>Syringe scale</title>
    <meta charset=utf-8>
    <script>
        window.onpageshow = function(event) {
            if (event.persisted) {
                window.location.reload()
            }
        };
    </script>

</head>

<body>
    <div style="float: right">Hi, usr: {{ request.cookies.get('username') }} </div>
    <h1>Syringe scale</h1>

    <button> <a href="{{ url_for('add_new') }}">add medicine</a></button>

    <br><br>

    <table border=3>  <!-- show medicine list -->
        <tr>
            <th width=20px>No.</th>
            <th width=120px>Barcode</th>
            <th width=400px>Medicine name</th>
            <th width=100px>Dosage</th>
            <th width=100px>Diluted doses</th>
            <th width=100px>Injection site</th>
        </tr>
        {% if (medicine_list |length > 0) %}
            {% for i in medicine_list %}
                <tr>
                    <td>{{ loop.index0 + 1 }}</td>
                    {% for j in i %}
                        <td>{{ j }}</td>
                    {%endfor%}
                </tr>
            {%endfor%}
        {% endif %}
    </table>


    <button style="float:left"> <a href="{{ url_for('submit_result') }}">Submit</a></button>


</body>
