<style>
    .inputWithin {
        position: relative; 
        display: inline-block;
    }		
    .inputWithin .img { /*左邊圖示*/
        position: absolute; 			
        left: 10px;
        top: calc(50% - 0.5em);
    }
</style>

<meta charset="utf-8">
<h2 align="center">請輸入使用者資訊</h2>
<br>
<p align="center">學號或是 ID</p>
<center>
    <div class="inputWithin">
        <img id = 'id' src="" width="30" background-color: transparent/>
        <input id = 'IDF_ID' value="">
    </div>
</center>
<!-- <img id = 'id' src="" width="200" height="200"/>
<center><input id = 'IDF_ID' value=""></center> -->
<br>
<p align="center">姓名</p>
<center>
    <div class="inputWithin">
        <img id = 'name' src="" width="30" background-color: transparent/>
        <input id = 'IDF_name' value="">
    </div>
</center>



<script>
    async function getvalue()
    {
        const idf_id = document.getElementById('IDF_ID');
        const idf_name = document.getElementById('IDF_name');

        if (idf_id.value != "")
        {
            var img = document.getElementById('id');
            img.src="../pic/ok1.jpeg";
        }else
        {
            var img = document.getElementById('id');
            img.src="";
        }
        if (idf_name.value != "")
        {
            var img = document.getElementById('name');
            img.src="../pic/ok1.jpeg";
        }else
        {
            var img = document.getElementById('name');
            img.src="";
        }
    }
    setInterval(getvalue, 1000);
</script>
